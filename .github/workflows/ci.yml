name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            make \
            gcovr \
            cppcheck \
            cloc \
            python3 \
            python3-pip

          pip3 install lizard

      - name: Show environment
        run: |
          echo "OS:"
          lsb_release -a || cat /etc/os-release
          echo
          echo "GCC:"
          gcc --version
          echo
          echo "Make:"
          make --version
          echo
          echo "Cppcheck:"
          cppcheck --version
          echo
          echo "cloc:"
          cloc --version
          echo
          echo "Lizard:"
          lizard --version
          echo
          echo "gcov:"
          gcov --version

      - name: Build
        run: make

      - name: Run tests
        run: make test

      - name: Run static analysis
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --inconclusive \
            --error-exitcode=1 \
            --std=c17 \
            --language=c \
            src

      - name: Check LOC
        run: cloc src test

      - name: Check complexity
        run: lizard src test -C 10

      - name: Check function length
        run: python3 scripts/check_function_length.py src test 80

      - name: Check comment ratio
        run: python3 scripts/check_comment_ratio.py src test 20

      - name: Check line coverage
        run: |
          gcovr --root . --txt
          gcovr --root . --fail-under-line 80
